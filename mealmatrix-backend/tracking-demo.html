<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>MealMatrix — Live Tracking Demo</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
  body { font-family: system-ui, sans-serif; background: #0f1115; color: #eee; padding: 40px; }
  h1 { color: #4ade80; }
  #map { width: 100%; height: 400px; background: #1a1d24; border-radius: 12px; position: relative; overflow: hidden; margin-top: 20px; }
  #pin { width: 20px; height: 20px; background: #4ade80; border-radius: 50%; position: absolute; box-shadow: 0 0 20px #4ade80; transition: all 1s ease-out; }
  #log { margin-top: 20px; font-family: monospace; font-size: 13px; color: #888; max-height: 150px; overflow-y: auto; }
  input, button { padding: 8px 12px; margin-right: 8px; border-radius: 6px; border: 1px solid #333; background: #1a1d24; color: #eee; }
  button { background: #4ade80; color: #000; font-weight: 600; cursor: pointer; border: none; }
</style>
</head>
<body>
  <h1>🛵 MealMatrix — Live Delivery Tracking (Demo)</h1>
  <p>This simulates a delivery partner's GPS moving toward the customer, broadcast over WebSocket. This is what your real tracking screen looks like under the hood — plug in Leaflet/Mapbox on top of this same event stream for the real map UI.</p>

  <div>
    <input id="orderId" value="demo-order-123" />
    <button onclick="startSimulation()">Start Simulated Delivery</button>
  </div>

  <div id="map"><div id="pin" style="left: 10px; top: 190px;"></div></div>
  <div id="log"></div>

<script>
  const socket = io('http://localhost:5000');
  const pin = document.getElementById('pin');
  const log = document.getElementById('log');

  function logMsg(msg) {
    log.innerHTML = `<div>${new Date().toLocaleTimeString()} — ${msg}</div>` + log.innerHTML;
  }

  socket.on('connect', () => logMsg('Connected to server: ' + socket.id));

  socket.on('location_update', ({ lat, lng }) => {
    // Map lat/lng range to pixel position for this demo box (fake projection)
    const x = ((lng + 1) / 2) * 700;
    const y = 380 - ((lat + 1) / 2) * 380;
    pin.style.left = x + 'px';
    pin.style.top = y + 'px';
    logMsg(`Location update: lat=${lat.toFixed(4)}, lng=${lng.toFixed(4)}`);
  });

  function startSimulation() {
    const orderId = document.getElementById('orderId').value;
    socket.emit('join_order_room', orderId);
    logMsg('Joined room for order: ' + orderId);

    let step = 0;
    const totalSteps = 20;
    const startLat = -0.9, startLng = -0.9;
    const endLat = 0.9, endLng = 0.9;

    const interval = setInterval(() => {
      step++;
      const lat = startLat + ((endLat - startLat) * step) / totalSteps;
      const lng = startLng + ((endLng - startLng) * step) / totalSteps;

      socket.emit('partner_location_tick', { userId: 'demo-partner', orderId, lat, lng });

      if (step >= totalSteps) {
        clearInterval(interval);
        logMsg('Delivery partner has arrived!');
      }
    }, 1000);
  }
</script>
</body>
</html>
